services:
  server:
    image: ghcr.io/tarvitave/squansq-server:latest
    restart: unless-stopped
    environment:
      PORT: "3001"
      DB_URL: "file:/data/squansq.db"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      SQUANSQ_REPO_PATH: "/repo"
    volumes:
      - db_data:/data
      # Persist claude auth across container restarts (complete OAuth once, stays logged in)
      - claude_auth:/root/.claude
      # Mount the squansq repo so claude agents can read/edit the code
      - /opt/squansq-repo:/repo
    cap_add:
      - SYS_PTRACE
    devices:
      - /dev/ptmx:/dev/ptmx

  client:
    image: ghcr.io/tarvitave/squansq-client:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - server

volumes:
  db_data:
  claude_auth:
