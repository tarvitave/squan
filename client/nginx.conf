# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name squansq.com www.squansq.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name squansq.com www.squansq.com;

    ssl_certificate     /etc/letsencrypt/live/squansq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/squansq.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        # These two headers are required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Disable buffering for real-time streaming
        proxy_buffering off;
    }
}
